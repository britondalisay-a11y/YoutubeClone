<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reveal Text Animation</title>
    <style>
      body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .reveal-text {
        font-size: 2rem;
        display: flex;
        gap: 0.1em;
      }

      .reveal-text span {
        opacity: 0;
        transform: translateY(20px);
        display: inline-block;
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
      }

      .reveal-text span.show {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="reveal-text" id="revealText">Hello World!</div>

    <script>
      (function () {
        const textContainer = document.getElementById("revealText");
        const text = textContainer.textContent;
        textContainer.textContent = ""; // Clear original text

        // Split text into spans
        [...text].forEach((char) => {
          const span = document.createElement("span");
          span.textContent = char;
          textContainer.appendChild(span);
        });

        // Animate each letter with a delay
        const spans = textContainer.querySelectorAll("span");
        spans.forEach((span, index) => {
          setTimeout(() => {
            span.classList.add("show");
          }, index * 100); // 100ms delay between letters
        });
      })();
    </script>
  </body>
</html>
